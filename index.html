<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <!-- กันซูมจากการแตะรัว ๆ บนจอสัมผัส + กินพื้นที่รอบ notch -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>EasyGame</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        /* กัน pull-to-refresh / scroll เด้ง / ลากจอ ระหว่างเล่นบนมือถือ */
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        /* dvh = ความสูงจริงหลังหักแถบเบราว์เซอร์มือถือ (vh เดิมล้นจอ) */
        height: 100dvh;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
